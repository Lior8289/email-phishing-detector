<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Email Phishing Detector</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --border: #e2e5ea;
      --text: #1a1e2c;
      --muted: #6b7280;
      --accent: #3d5afe;
      --accent-hover: #2a3ff0;
      --safe-bg: #e6faf0;
      --safe-border: #6ee7a0;
      --safe-text: #166534;
      --sus-bg: #fff8eb;
      --sus-border: #fbbf24;
      --sus-text: #92400e;
      --phish-bg: #fff0f0;
      --phish-border: #f87171;
      --phish-text: #991b1b;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      max-width: 940px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin: 14px 0 5px;
    }

    input,
    textarea {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition:
        border-color 0.15s ease,
        box-shadow 0.15s ease;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61, 90, 254, 0.12);
    }

    input::placeholder,
    textarea::placeholder {
      color: #adb3be;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.55;
    }

    button {
      padding: 11px 20px;
      border-radius: 10px;
      border: 0;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      font-size: 14px;
      transition:
        background 0.15s ease,
        transform 0.1s ease,
        box-shadow 0.15s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(61, 90, 254, 0.25);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 14px rgba(61, 90, 254, 0.3);
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    .btn-secondary:hover {
      background: #ebedf1;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row>div {
      flex: 1;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .safe {
      background: var(--safe-bg);
      border: 1.5px solid var(--safe-border);
      color: var(--safe-text);
    }

    .sus {
      background: var(--sus-bg);
      border: 1.5px solid var(--sus-border);
      color: var(--sus-text);
    }

    .phish {
      background: var(--phish-bg);
      border: 1.5px solid var(--phish-border);
      color: var(--phish-text);
    }

    .muted {
      color: var(--muted);
    }

    ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    li {
      margin-bottom: 5px;
      line-height: 1.5;
      font-size: 13.5px;
    }

    li b {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: var(--accent);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .top h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      white-space: nowrap;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 20px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 860px) {
      .grid {
        grid-template-columns: 1.1fr 0.9fr;
      }
    }

    .result-heading {
      margin: 0 0 16px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-heading::before {
      content: "";
      width: 4px;
      height: 18px;
      background: var(--accent);
      border-radius: 4px;
      display: inline-block;
    }

    .result-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      color: var(--muted);
      font-size: 13.5px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      text-align: center;
      padding: 20px;
    }

    .stat-row {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }

    .stat {
      background: var(--bg);
      border-radius: 10px;
      padding: 10px 14px;
      flex: 1;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 600;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
      font-family: "JetBrains Mono", monospace;
    }

    h4 {
      font-size: 13px;
      font-weight: 700;
      margin: 16px 0 8px;
      color: var(--text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }

    a:hover {
      text-decoration: underline;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      align-items: center;
    }

    #status {
      font-size: 13px;
      color: var(--muted);
    }

    /* Spinner */
    .scanning #status::after {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Fade in result */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>

<body>
  <div class="top">
    <h2>🛡️ Email Phishing Detector</h2>
  </div>

  <p class="subtitle">
    Paste an email and click <strong>Scan</strong>. The API returns
    classification, confidence, and reasons.
  </p>

  <div class="grid">
    <div class="card">
      <div class="row">
        <div>
          <label>From</label>
          <input id="from_addr" placeholder="support@company.com" />
        </div>
        <div>
          <label>Subject</label>
          <input id="subject" placeholder="Security Alert: Action Required" />
        </div>
      </div>

      <label>Email Body</label>
      <textarea id="body" placeholder="Paste the email body here..."></textarea>

      <div class="actions">
        <button id="scanBtn" class="btn-primary">⚡ Scan</button>
        <button id="exampleBtn" class="btn-secondary">Load examples</button>
        <span id="status"></span>
      </div>
    </div>

    <div class="card">
      <div class="result-heading">Result</div>
      <div id="result">
        <div class="result-placeholder">
          No scan yet — paste an email to get started.
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function badgeClass(label) {
      if (label === "Safe") return "badge safe";
      if (label === "Suspicious") return "badge sus";
      return "badge phish";
    }

    const examples = [
      {
        from: "notifications@upwind.comeet-notifications.com",
        subject: "Upwind - next step",
        body: "Hi Lior,\n\nIt was a pleasure talking to you earlier regarding the QA Engineer position.\n\nFollowing our conversation, we would like to invite you to the next stage – a home assignment (file attached).\n\nPlease send your completed assignment to dan.yahav@upwind.io.\n\nYou can also use this email address for any questions that may arise.\n\nUpon receiving your submission, the next stage will be a 60-minute technical interview with Dan Yahav (Senior Vice President, Platforms) and Gal Amato (Release Operations Team Lead), which will take place in our office.\n\nThe interview will include a presentation where you will have the opportunity to showcase your skills and expertise based on the home assignment.\n\nPlease schedule the date for the next interview as soon as you receive this email by selecting a time for your interview.",
      },
      {
        from: "newsletter@medium.com",
        subject: "Your weekly reading recommendations",
        body: "Hi there,\n\nHere are this week's top stories curated just for you based on your reading history.\n\n1. How to Build Better Habits in 2026\n2. The Future of Remote Work\n3. Understanding TypeScript Generics\n\nHappy reading!\n— The Medium Team\n\nUnsubscribe: https://medium.com/settings/notifications",
      },
      {
        from: "shipping@amaz0n-orders.com",
        subject: "Your order #839-2847 has shipped",
        body: "Dear Customer,\n\nYour recent order has been shipped and is on its way!\n\nHowever, we noticed a problem with your payment method. Please update your billing information within 24 hours to avoid delivery delays.\n\nUpdate now: http://amaz0n-orders.com/billing-update\n\nThank you for shopping with us.",
      },
      {
        from: "support@paypaI.com",
        subject: "URGENT: verify your account",
        body: "We detected suspicious activity. Verify immediately or your account will be suspended.\nClick: http://bit.ly/xyz",
      },
      {
        from: "security-noreply@g00gle-accounts.net",
        subject: "⚠️ CRITICAL: Someone has your password — Act NOW",
        body: "ALERT: Your Google account was accessed from North Korea at 3:47 AM.\n\nIf this wasn't you, your account WILL BE PERMANENTLY DELETED in 2 hours.\n\nYou MUST verify your identity immediately:\nhttp://g00gle-accounts.net/verify?id=8x7k2m\n\nEnter your current password, SSN, and date of birth to confirm ownership.\n\nGoogle Security Team\nThis is an automated message. Do not reply.",
      },
      {
        from: "prince.abubakar@royalfund-ng.com",
        subject: "RE: CONFIDENTIAL — $24.5M USD Transfer To Your Account",
        body: "DEAR BELOVED FRIEND,\n\nI am Prince Abubakar, son of the late King of a West African nation. I have $24,500,000 USD trapped in a foreign security vault and I need YOUR help to transfer it.\n\nYou will receive 30% ($7,350,000) for your assistance.\n\nAll I need from you:\n- Full name\n- Bank account number and routing number\n- Copy of passport or government ID\n- A small processing fee of $500 via Western Union\n\nThis is 100% RISK FREE and LEGAL. Reply urgently as time is running out!!!\n\nGod Bless,\nPrince Abubakar\nhttp://royalfund-ng.com/claim-funds",
      },
    ];

    let lastIndex = -1;
    $("exampleBtn").onclick = () => {
      let idx;
      do {
        idx = Math.floor(Math.random() * examples.length);
      } while (idx === lastIndex && examples.length > 1);
      lastIndex = idx;

      const ex = examples[idx];
      $("from_addr").value = ex.from;
      $("subject").value = ex.subject;
      $("body").value = ex.body;
    };

    // --- Query helpers ---
    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    async function prefillFromQuery() {
      const token = getParam("token");
      if (token) {
        try {
          const res = await fetch("/prefill/" + token);
          if (res.ok) {
            const data = await res.json();
            if (data.from_addr) $("from_addr").value = data.from_addr;
            if (data.subject) $("subject").value = data.subject;
            if (data.body) $("body").value = data.body;
            return { hasAny: true };
          }
        } catch (e) {
          console.warn("Prefill failed:", e);
        }
      }

      // Fallback to old query-param method
      const fromQ = getParam("from");
      const subjectQ = getParam("subject");
      const bodyQ = getParam("body");
      const hasAny = !!(fromQ || subjectQ || bodyQ);
      if (fromQ) $("from_addr").value = fromQ;
      if (subjectQ) $("subject").value = subjectQ;
      if (bodyQ) $("body").value = bodyQ;
      return { hasAny };
    }

    // --- Core scan function (manual + auto) ---
    async function doScan() {
      $("status").textContent = "Scanning…";
      document.body.classList.add("scanning");
      $("result").innerHTML = "";

      const payload = {
        from_addr: $("from_addr").value || "",
        subject: $("subject").value || "",
        body: $("body").value || "",
      };

      try {
        const res = await fetch("/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();

        const confPct = Math.round((data.confidence || 0) * 100);
        const mlPct =
          data.ml_probability == null
            ? "N/A"
            : Math.round(data.ml_probability * 100) + "%";

        let html = `<div class="fade-in">
        <div style="display:flex; align-items:center; gap:10px;">
          <span class="${badgeClass(data.classification)}">${data.classification}</span>
        </div>

        <div class="stat-row">
          <div class="stat">
            <div class="stat-label">Confidence</div>
            <div class="stat-value">${confPct}%</div>
          </div>
          <div class="stat">
            <div class="stat-label">ML Prob</div>
            <div class="stat-value">${mlPct}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Rules</div>
            <div class="stat-value">${data.rules_score}</div>
          </div>
        </div>`;

        if (data.rule_hits && data.rule_hits.length) {
          html += `<h4>Why?</h4><ul>`;
          for (const h of data.rule_hits.slice(0, 8)) {
            html += `<li><b>${h.id}</b> <span class="muted">(sev ${h.severity})</span> — ${h.message}</li>`;
          }
          html += `</ul>`;
        } else {
          html += `<div class="muted" style="margin-top:14px; font-size:13px;">No rules triggered.</div>`;
        }

        if (data.extracted_links && data.extracted_links.length) {
          html += `<h4>Extracted links</h4><ul>`;
          for (const link of data.extracted_links.slice(0, 8)) {
            const safe = String(link)
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            html += `<li><a href="${safe}" target="_blank" rel="noreferrer">${safe}</a></li>`;
          }
          html += `</ul>`;
        }

        html += `</div>`;
        $("result").innerHTML = html;
        $("status").textContent = "Done ✓";
      } catch (e) {
        $("result").innerHTML =
          `<div class="fade-in" style="color:var(--phish-text); background:var(--phish-bg); padding:14px; border-radius:10px;">
          <b>Error:</b> ${String(e.message).slice(0, 350)}
        </div>`;
        $("status").textContent = "";
      } finally {
        document.body.classList.remove("scanning");
      }
    }

    // Manual scan button
    $("scanBtn").onclick = doScan;

    window.addEventListener("DOMContentLoaded", () => {
      const { hasAny } = prefillFromQuery();

      if (hasAny) {
        doScan();
        // clean the URL after reading params (hides long body)
        history.replaceState({}, "", "/");
      }
    });
  </script>
</body>

</html>
